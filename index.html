<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color Changer</title>
</head>
<body>

    <div class="container">

        <h1>Click a Button to Change Background Color</h1>

        <div class="buttons">

            <button id="red-btn" onclick="changeColorRed()">
                Red
            </button>
            <button id="green-btn" onclick="changeColorGreen()">
                Green
            </button>
            <button id="blue-btn" onclick="changeColorBlue()">
                Blue
            </button>
            <button id="orange-btn" onclick="changeColorOrange()">
                Orange
            </button>
        </div>
        <button id="reset-btn" onclick="resetColor()">
            Reset
        </button>
    </div>
    
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    transition: background-color 0.8s ease;
}

.container{
    text-align: center;
}

h1{
    margin-bottom: 25px;
}

.buttons{
    display: flex;
    justify-content: center;
    gap: 15px;
}

button{
    padding: 12px 25px;
    border: 2px solid black;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

#red-btn{
    background-color: red;
}

#green-btn{
    background-color: green;
}
#blue-btn{
    background-color: blue;
}
#orange-btn{
    background-color: orange;
}
#reset-btn{
    background-color: black;
    margin-top: 20px;
}
    </style>

    <script src="app.js"></script>

</body>
</html>
